name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          include-prerelease: true

      - name: Install wasm-tools workload
        run: dotnet workload install wasm-tools

      - name: Publish
        run: dotnet publish blazor/SqlVisualizer.csproj -c Release -o publish

      - name: Fix base href for GitHub Pages subdirectory
        run: |
          sed -i 's|<base href="/" />|<base href="/SQL-Visualizer/" />|g' publish/wwwroot/index.html

      - name: Add .nojekyll (prevent Jekyll from ignoring _framework files)
        run: touch publish/wwwroot/.nojekyll

      - name: Add 404.html for SPA deep-link fallback
        run: cp publish/wwwroot/index.html publish/wwwroot/404.html

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: publish/wwwroot

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
